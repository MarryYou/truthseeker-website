[alembic]
script_location = backend/migrations
# DATABASE_URL 环境变量覆盖此值（生产/开发通用）
sqlalchemy.url = sqlite+aiosqlite:///./truthseeker.db

# 迁移版本格式
file_template = %%(rev)s_%%(slug)s

# 自动生成的迁移时间格式
timezone = Asia/Shanghai

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
